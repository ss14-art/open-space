- type: markingsGroup
  parent: Undergarments
  id: Felinid
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Head:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.HeadTop:
      limit: 1
      required: true
      default: [ FelinidEarsOuter ]
    enum.HumanoidVisualLayers.HeadSide:
      limit: 1
      required: true
      default: [ FelinidEarsInner ]
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      default: [ FelinidTail ]
    enum.HumanoidVisualLayers.Special:
      limit: 0
      required: false
    enum.HumanoidVisualLayers.Chest:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.Snout:
      limit: 0
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.UndergarmentTop:
      limit: 1
      required: false
      nudityDefault: [ UndergarmentTopTanktop ]
    enum.HumanoidVisualLayers.UndergarmentBottom:
      limit: 1
      required: false
      nudityDefault: [ UndergarmentBottomBoxers ]

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceFelinid
  name: felinid appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganFelinidTorso
      Head: OrganFelinidHead
      ArmLeft: OrganFelinidArmLeft
      ArmRight: OrganFelinidArmRight
      HandRight: OrganFelinidHandRight
      HandLeft: OrganFelinidHandLeft
      LegLeft: OrganFelinidLegLeft
      LegRight: OrganFelinidLegRight
      FootLeft: OrganFelinidFootLeft
      FootRight: OrganFelinidFootRight
      Brain: OrganFelinidBrain
      Eyes: OrganFelinidEyes
      Tongue: OrganFelinidTongue
      Appendix: OrganFelinidAppendix
      Ears: OrganFelinidEars
      Lungs: OrganFelinidLungs
      Heart: OrganFelinidHeart
      Stomach: OrganFelinidStomach
      Liver: OrganFelinidLiver
      Kidneys: OrganFelinidKidneys
  - type: HumanoidProfile
    species: Felinid
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female

- type: entity
  parent:
  - AppearanceFelinid
  - BaseSpeciesMobOrganic
  id: MobFelinid
  name: Uwist McHands
  components:
  - type: Butcherable
    spawned:
    - id: FoodMeatHuman
      amount: 5

- type: entity
  parent: AppearanceFelinid
  id: MobFelinidDummy
  name: Uwist McHands
  suffix: Dummy

- type: entity
  parent: OrganBase
  id: OrganFelinid
  abstract: true
  suffix: felinid

- type: entity
  id: OrganFelinidMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Human ]

- type: entity
  parent: OrganFelinid
  id: OrganFelinidInternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi

- type: entity
  id: OrganFelinidVisual
  abstract: true
  components:
  - type: VisualOrgan
    data:
      sprite: Mobs/Species/Human/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Felinid

- type: entity
  parent: [ OrganFelinid, OrganFelinidVisual ]
  id: OrganFelinidExternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/parts.rsi

- type: entity
  parent: [ OrganBaseTorsoSexed, OrganBaseTorso, OrganFelinidExternal ]
  id: OrganFelinidTorso

- type: entity
  parent: [ OrganBaseHeadSexed, OrganBaseHead, OrganFelinidExternal ]
  id: OrganFelinidHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.HeadTop
    - enum.HumanoidVisualLayers.HeadSide

- type: entity
  parent: [ OrganBaseArmLeft, OrganFelinidExternal ]
  id: OrganFelinidArmLeft

- type: entity
  parent: [ OrganBaseArmRight, OrganFelinidExternal ]
  id: OrganFelinidArmRight

- type: entity
  parent: [ OrganBaseHandLeft, OrganFelinidExternal ]
